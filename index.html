<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>餐饮小游戏</title>
  <style>
    /* 全局重置：清除边距，box-sizing 统一 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;         /* 防止页面滚动条干扰游戏 */
    }
    #wrapper {
      position: relative;       /* 让 loading 遮罩相对于画布定位 */
      max-width: 100vw;
      max-height: 100vh;
    }
    canvas {
      display: block;
      border: 2px solid #8e7a5a;
      border-radius: 8px;
      background: #1a1c23;     /* 图片加载前的背景色 */
      /* 手机自适应：画布逻辑 800×600，CSS 等比缩放以适配小屏 */
      max-width: 100%;
      height: auto;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font: 18px sans-serif;
      background: #1a1c23;
      border-radius: 8px;
      pointer-events: none;     /* 让点击穿透到 canvas */
    }
    #loading.hidden { display: none; }
  </style>
  <script type="module" crossorigin src="/assets/index-C2lUyTnX.js"></script>
</head>
<body>
  <div id="wrapper">
    <!-- 游戏主画布：Game 类通过 'gameCanvas' 获取 -->
    <canvas id="gameCanvas"></canvas>
    <!-- 加载提示（目前未使用，保留以备后续资源加载较慢时显示） -->
    <div id="loading" class="hidden">加载中...</div>
  </div>
  <!-- 以 ES Module 方式加载游戏入口 -->
</body>
</html>
